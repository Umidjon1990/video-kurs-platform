<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0d0521" />
    <title>O'quv Platformasi - Video Kurslar</title>
    <meta name="description" content="Professional video kurslar platformasi. O'qituvchilar kurs yaratadi, o'quvchilar o'qiydi va rivojlanadi." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <style>
      @font-face {
        font-family: 'Calibri';
        src: local('Calibri'), local('calibri');
        font-weight: 400;
        font-style: normal;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      document.documentElement.classList.add("dark");
      document.body.style.backgroundColor = "#111827";
      document.body.style.color = "#e5e7eb";
      window.onerror = function(msg, src, line, col, err) {
        var root = document.getElementById("root");
        if (root && !root.hasChildNodes()) {
          root.innerHTML = '<div style="padding:40px;text-align:center;font-family:sans-serif"><h2>Xatolik yuz berdi</h2><p style="color:#9ca3af">Sahifani qayta yuklang (Ctrl+Shift+R)</p><pre style="text-align:left;max-width:600px;margin:20px auto;padding:16px;background:#1f2937;border-radius:8px;overflow:auto;font-size:12px;color:#f87171">' + msg + '</pre><button onclick="location.reload(true)" style="padding:8px 24px;background:#3b82f6;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px">Qayta yuklash</button></div>';
        }
      };
      window.addEventListener("unhandledrejection", function(e) {
        var root = document.getElementById("root");
        if (root && !root.hasChildNodes()) {
          root.innerHTML = '<div style="padding:40px;text-align:center;font-family:sans-serif"><h2>Xatolik yuz berdi</h2><p style="color:#9ca3af">Sahifani qayta yuklang (Ctrl+Shift+R)</p><pre style="text-align:left;max-width:600px;margin:20px auto;padding:16px;background:#1f2937;border-radius:8px;overflow:auto;font-size:12px;color:#f87171">' + (e.reason || 'Unknown error') + '</pre><button onclick="location.reload(true)" style="padding:8px 24px;background:#3b82f6;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px">Qayta yuklash</button></div>';
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
